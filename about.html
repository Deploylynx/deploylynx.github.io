<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>About - DeployLynx</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
overflow-x:hidden;
}

/* IMPORTANT FIX → allow clicks through background */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
pointer-events:none;
}

/* NAVBAR */
nav{
display:flex;
justify-content:space-between;
padding:20px 40px;
background:#020617;
position:sticky;
top:0;
z-index:10;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
cursor:pointer;
}

nav a:hover{
color:#38bdf8;
}

/* HERO */
.container{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:80vh;
text-align:center;
}

/* TEXT */
h1{
font-size:50px;
margin-bottom:10px;
}

.subtitle{
font-size:20px;
color:#cbd5f5;
margin-bottom:40px;
}

/* SIMPLE INFO (NO CARDS) */
.info{
font-size:18px;
color:#94a3b8;
margin-bottom:20px;
}

/* COMING SOON */
.coming{
margin-top:40px;
font-size:22px;
color:#38bdf8;
}

/* FOOTER */
footer{
background:#020617;
padding:20px;
text-align:center;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<nav>
<div id="logo"></div>

<div>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="services.html">Services</a>
<a href="projects.html">Projects</a>
<a href="contact.html">Contact</a>
</div>
</nav>

<div class="container">

<h1>About DeployLynx</h1>

<div class="subtitle">
AI Automation • DevOps • Cloud Solutions
</div>

<!-- SIMPLE TEXT (NO CARDS) -->
<div class="info">Services — DevOps • Cloud • AI Automation</div>
<div class="info">Projects</div>

<div class="coming">Coming Soon</div>

</div>

<footer>
DeployLynx © 2026 All Rights Reserved
</footer>

<script>

/* BACKGROUND (NON-BLOCKING) */
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let p=[];

for(let i=0;i<50;i++){
p.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
dx:(Math.random()-0.5),
dy:(Math.random()-0.5)
});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

p.forEach(pt=>{
pt.x+=pt.dx;
pt.y+=pt.dy;

ctx.fillStyle="#38bdf8";
ctx.beginPath();
ctx.arc(pt.x,pt.y,2,0,Math.PI*2);
ctx.fill();
});

requestAnimationFrame(draw);
}
draw();

/* LOGO ANIMATION */
let t="DeployLynx",i=0;

function anim(){
if(i<t.length){
logo.innerHTML+=t[i++];
setTimeout(anim,120);
}else{
setTimeout(()=>{logo.innerHTML="";i=0;anim();},1500);
}
}
anim();

</script>

</body>
</html>
