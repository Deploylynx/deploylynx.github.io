<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DeployLynx Contact</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
background:#0a0f1c;
color:white;
overflow-x:hidden;
}

/* FIX CLICK ISSUE */
canvas{
position:fixed;
top:0;
left:0;
z-index:0;
pointer-events:none;
}

nav{
position:relative;
z-index:10;
display:flex;
justify-content:space-between;
padding:20px 40px;
}

nav a{
color:white;
margin-left:20px;
text-decoration:none;
cursor:pointer;
}

.container{
position:relative;
z-index:5;
display:flex;
flex-direction:column;
align-items:center;
margin-top:80px;
}

.form-card{
background:#111;
padding:25px;
border-radius:12px;
width:320px;
}

input,textarea{
width:100%;
padding:10px;
margin-bottom:10px;
background:#000;
border:none;
color:white;
border-radius:6px;
}

button{
padding:10px;
width:100%;
background:#00c6ff;
border:none;
cursor:pointer;
}

.whatsapp-btn{
display:block;
text-align:center;
margin-top:10px;
background:#25D366;
padding:10px;
color:white;
text-decoration:none;
border-radius:6px;
}

/* CHATBOT */
#chatIcon{
position:fixed;
right:20px;
bottom:20px;
background:#00c6ff;
width:60px;
height:60px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
z-index:1000;
}

#chatBox{
position:fixed;
right:20px;
bottom:90px;
width:320px;
height:420px;
background:black;
display:none;
flex-direction:column;
border-radius:12px;
z-index:1000;
}

#messages{
flex:1;
overflow:auto;
padding:10px;
display:flex;
flex-direction:column;
}

.msg{
padding:8px;
margin:5px;
border-radius:6px;
max-width:80%;
}

.user{background:#00c6ff;color:black;align-self:flex-end;}
.ai{background:#111;color:#00c6ff;}

#inputBox{
display:flex;
}

#inputBox input{
flex:1;
padding:10px;
background:#111;
border:none;
color:white;
}

#inputBox button{
padding:10px;
background:#00c6ff;
border:none;
}
</style>
</head>

<body>

<canvas></canvas>

<nav>
<div>DeployLynx</div>
<div>
<a href="#">Home</a>
<a href="#">Services</a>
<a href="#">Contact</a>
</div>
</nav>

<div class="container">

<div class="form-card">
<h3>Contact</h3>

<form action="https://formspree.io/f/xpqykbvr" method="POST">
<input type="text" placeholder="Name" required>
<input type="email" placeholder="Email" required>
<textarea placeholder="Message"></textarea>
<button>Send Message</button>
</form>

<a class="whatsapp-btn" href="https://wa.me/message/VXHPTQC4ZU46A1" target="_blank">
💬 Chat on WhatsApp
</a>
</div>

</div>

<!-- CHATBOT -->
<div id="chatIcon">💬</div>

<div id="chatBox">
<div id="messages"></div>

<div id="inputBox">
<input id="input" placeholder="Type...">
<button onclick="send()">Send</button>
</div>
</div>

<script>
let history=[];
let askedEmail=false;

function add(text,type){
let d=document.createElement("div");
d.className="msg "+type;
d.innerText=text;
document.getElementById("messages").appendChild(d);
d.scrollIntoView();
}

function ai(text){
let t=text.toLowerCase();
history.push(t);
let full=history.join(" ");

if(t.includes("hi")||t.includes("hello")){
return "Hi 👋 This is DeployLynx team. How can we help you today?";
}

if(full.includes("ecommerce")){
return "Got it — eCommerce projects require strong performance and uptime. We can help you scale your website so it handles traffic smoothly without crashes.";
}

if(full.includes("traffic")){
return "To increase traffic, we focus on improving speed, uptime, and SEO performance. A fast and stable site naturally ranks better and converts more users.";
}

if(full.includes("deploy")||full.includes("launch")){
return "We can deploy your project with high availability, load balancing, and zero-downtime setup so your users always get a smooth experience.";
}

if(full.includes("ci")||full.includes("cd")){
return "We’ll automate your entire deployment using CI/CD so updates become fast, reliable, and error-free.";
}

if(t.includes("price")||t.includes("cost")){
return "It depends on your project requirements. The best way is a quick discussion so we can understand your goals and suggest the right solution. You can connect with us on WhatsApp for a faster response.";
}

if(!askedEmail && history.length>3){
askedEmail=true;
return "This looks like a serious project 🚀 Can you share your email? We’ll send you a proper plan tailored to your needs.";
}

if(askedEmail && t.includes("@")){
return "Perfect 👍 Our team will contact you shortly. For faster communication, feel free to message us on WhatsApp as well.";
}

return "Got it 👍 Can you tell me a bit more about your project so I can guide you better?";
}

function send(){
let input=document.getElementById("input");
let val=input.value.trim();
if(!val) return;

add(val,"user");
input.value="";

setTimeout(()=>{
add(ai(val),"ai");
},500);
}

// toggle
document.getElementById("chatIcon").onclick=()=>{
let box=document.getElementById("chatBox");
box.style.display=box.style.display==="flex"?"none":"flex";
};
</script>

</body>
</html>
