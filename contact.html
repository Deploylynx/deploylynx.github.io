<!-- ================= AI CHATBOT ================= -->
<style>
#chatbotIcon{
  position:fixed;
  bottom:25px;
  right:25px;
  background:linear-gradient(45deg,#00c6ff,#ff6ec7);
  color:#000;
  padding:14px 16px;
  border-radius:50%;
  cursor:pointer;
  z-index:9999;
  font-size:20px;
  box-shadow:0 0 20px #00c6ff;
  transition:0.3s;
}
#chatbotIcon:hover{
  transform:scale(1.1);
  box-shadow:0 0 30px #ff6ec7;
}

#chatbotWindow{
  position:fixed;
  bottom:90px;
  right:25px;
  width:320px;
  height:420px;
  background:#0a0f1c;
  border:1px solid #00c6ff;
  border-radius:12px;
  display:none;
  flex-direction:column;
  z-index:9999;
}

#chatbotHeader{
  background:#00c6ff;
  color:#000;
  padding:10px;
  font-weight:bold;
  cursor:pointer;
}

#chatbotMessages{
  flex:1;
  padding:10px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:8px;
}

#chatbotInput{
  display:flex;
}

#chatbotInput input{
  flex:1;
  padding:10px;
  border:none;
  outline:none;
}

#chatbotInput button{
  background:#00c6ff;
  border:none;
  padding:10px;
  cursor:pointer;
}
</style>

<div id="chatbotIcon">💬</div>

<div id="chatbotWindow">
  <div id="chatbotHeader">DeployLynx Assistant</div>
  <div id="chatbotMessages"></div>
  <div id="chatbotInput">
    <input type="text" id="chatInput" placeholder="Type your message...">
    <button id="sendBtn">Send</button>
  </div>
</div>

<script>
const icon = document.getElementById("chatbotIcon");
const box = document.getElementById("chatbotWindow");
const header = document.getElementById("chatbotHeader");
const messages = document.getElementById("chatbotMessages");
const input = document.getElementById("chatInput");
const send = document.getElementById("sendBtn");

let stage="start";

icon.onclick = ()=> box.style.display="flex";
header.onclick = ()=> box.style.display="none";

function addMsg(text,type){
  const d=document.createElement("div");
  d.style.padding="8px";
  d.style.borderRadius="8px";
  d.style.maxWidth="85%";

  if(type==="user"){
    d.style.background="#00c6ff";
    d.style.color="#000";
    d.style.alignSelf="flex-end";
  }else{
    d.style.background="#111";
    d.style.color="#00c6ff";
    d.style.alignSelf="flex-start";
  }

  d.innerText=text;
  messages.appendChild(d);
  messages.scrollTop=messages.scrollHeight;
}

function reply(text){
  setTimeout(()=>addMsg(text,"bot"),500);
}

/* 🔥 HUMAN-LIKE AI LOGIC */
function ai(text){
  let t=text.toLowerCase();

  if(stage==="start"){
    stage="ask";
    return "Hello 👋 Welcome to DeployLynx.\n\nHow can we assist you today?";
  }

  if(t.includes("ecommerce") || t.includes("traffic")){
    return "Great question 👍\n\nFor eCommerce websites, increasing traffic is only one part — your system must also handle visitors efficiently.\n\nWe usually optimize:\n✔ Website performance\n✔ Backend scalability\n✔ Deployment reliability\n\nThis helps convert visitors into actual customers.\n\nAre you currently facing slow speed or downtime issues?";
  }

  if(t.includes("slow") || t.includes("downtime") || t.includes("crash")){
    return "That makes sense.\n\nIt usually happens when infrastructure isn’t properly optimized.\n\nWe can help you set up:\n✔ Load-balanced servers\n✔ Auto-scaling\n✔ Stable CI/CD pipeline\n\nThis ensures your site stays fast even during high traffic.\n\nWould you like a quick assessment of your current setup?";
  }

  if(t.includes("yes")){
    return "Perfect 👍\n\nTo better understand your setup, could you share your email? Our team can review and guide you properly.";
  }

  if(t.includes("@")){
    fetch("https://script.google.com/macros/s/AKfycbztEuM2vU1PhSe5x4qr7N-FSvyFriPQtkuAEP74UxieW6sRRxQXps-Q-tjmhAmbSJ-KFg/exec",{
      method:"POST",
      body:JSON.stringify({email:text,message:"Chatbot Lead"}),
      headers:{"Content-Type":"application/json"},
      mode:"no-cors"
    });

    return "Thanks! 🙌\n\nOur team will review your requirements.\n\nFor faster communication, you can also connect with us on WhatsApp:\n\nhttps://wa.me/923XXXXXXXXX";
  }

  if(t.includes("price") || t.includes("cost") || t.includes("charges")){
    window.open("https://wa.me/923XXXXXXXXX?text=Hi%20I%20want%20pricing%20details","_blank");
    return "For pricing details, I’ve opened WhatsApp for you so we can discuss your requirements properly 👍";
  }

  return "Got it 👍\n\nCould you share a bit more detail so I can guide you better?";
}

send.onclick=()=>{
  let val=input.value.trim();
  if(!val) return;

  addMsg(val,"user");
  input.value="";

  reply(ai(val));
};

input.addEventListener("keypress",e=>{
  if(e.key==="Enter") send.click();
});
</script>
