<section id="contact" style="padding:60px 20px; background:#0f172a; color:white; text-align:center;">

  <h2 style="font-size:28px; margin-bottom:20px;">Contact Us</h2>

  <form id="contactForm"
        action="https://script.google.com/macros/s/AKfycbztEuM2vU1PhSe5x4qr7N-FSvyFriPQtkuAEP74UxieW6sRRxQXps-Q-tjmhAmbSJ-KFg/exec"
        method="POST"
        style="max-width:500px; margin:auto; display:flex; flex-direction:column; gap:15px;">

    <input type="text" name="name" placeholder="Your Name" required
      style="padding:12px; border-radius:6px; border:none; outline:none;">

    <input type="email" name="email" placeholder="Your Email" required
      style="padding:12px; border-radius:6px; border:none; outline:none;">

    <textarea name="message" placeholder="Your Message" required rows="4"
      style="padding:12px; border-radius:6px; border:none; outline:none;"></textarea>

    <button type="submit"
      style="background:#38bdf8; color:#0f172a; padding:12px; border:none; border-radius:6px; cursor:pointer; font-weight:bold;">
      Send Message
    </button>

  </form>

  <p id="status" style="margin-top:15px; color:#38bdf8;"></p>

</section>

<script>
document.getElementById("contactForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const form = e.target;
  const data = new FormData(form);

  fetch(form.action, {
    method: "POST",
    body: data
  })
  .then(res => res.text())
  .then(() => {
    document.getElementById("status").innerText = "✅ Message sent successfully!";
    form.reset();
  })
  .catch(() => {
    document.getElementById("status").innerText = "❌ Failed to send message.";
  });
});
</script>
