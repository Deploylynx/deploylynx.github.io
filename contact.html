<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DeployLynx | Contact</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  background:#0a0f1c;
  color:#fff;
  overflow:hidden;
}

nav{
  display:flex;
  justify-content:space-between;
  padding:20px 50px;
  position:relative;
  z-index:3;
}

.logo{
  font-size:22px;
  color:#00c6ff;
  font-weight:bold;
}

.menu a{
  margin-left:25px;
  color:#ccc;
  text-decoration:none;
}

.menu a:hover{
  color:#00c6ff;
}

canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:0;
  pointer-events:none;
}

.container{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:90vh;
  position:relative;
  z-index:2;
  gap:20px;
}

.visual{
  position:absolute;
  left:80px;
}

.form-card{
  background:rgba(0,0,0,0.75);
  padding:30px;
  border-radius:15px;
  width:340px;
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.1);
  transition:0.3s;
  z-index:5;
  position:relative;
}

.form-card:hover{
  box-shadow:0 0 25px #00c6ff;
  transform:translateY(-5px);
}

.form-card h2{
  margin-bottom:20px;
  color:#00c6ff;
}

.form-card input,
.form-card textarea{
  width:100%;
  margin-bottom:15px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#111;
  color:#fff;
}

.form-card button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#00c6ff;
  color:#000;
  cursor:pointer;
  transition:0.3s;
}

.form-card button:hover{
  background:#ff6ec7;
}

.success{
  display:none;
  margin-top:15px;
  padding:10px;
  background:#00c6ff;
  color:#000;
  border-radius:8px;
  text-align:center;
}

/* WHATSAPP BUTTON */
.whatsapp-btn{
  margin-top:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  background:#25D366;
  color:#fff;
  padding:10px;
  border-radius:8px;
  text-decoration:none;
  font-weight:500;
  transition:0.3s;
}

.whatsapp-btn:hover{
  background:#1ebe5d;
  transform:translateY(-2px);
}

.social{
  display:flex;
  gap:20px;
  margin-top:10px;
}

.social a{
  padding:10px 15px;
  background:#111;
  border-radius:8px;
  color:#fff;
  text-decoration:none;
  transition:0.3s;
}

.social a:hover{
  background:#00c6ff;
  color:#000;
}

.cursor{
  width:10px;
  height:10px;
  background:gold;
  border-radius:50%;
  position:fixed;
  pointer-events:none;
  box-shadow:0 0 15px gold;
  transform:translate(-50%,-50%);
  z-index:999;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>
<div class="cursor"></div>

<nav>
  <div class="logo">DeployLynx</div>
  <div class="menu">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="services.html">Services</a>
    <a href="case-studies.html">Case Studies</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>

<div class="container">

  <div class="visual">
    <lottie-player 
      src="https://assets2.lottiefiles.com/packages/lf20_kyu7xb1v.json"
      background="transparent"
      speed="1"
      style="width:320px;height:320px;"
      loop autoplay>
    </lottie-player>
  </div>

  <div class="form-card">
    <h2>Contact Us</h2>

    <form id="contactForm" action="https://formspree.io/f/xpqykbvr" method="POST">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <textarea name="message" rows="4" placeholder="Message" required></textarea>

      <button type="submit">Send Message</button>
    </form>

    <!-- ✅ WHATSAPP BUTTON -->
    <a href="https://wa.me/message/VXHPTQC4ZU46A1" target="_blank" class="whatsapp-btn">
      💬 Chat on WhatsApp
    </a>

    <div class="success" id="successMsg">
      ✅ Message sent successfully!
    </div>
  </div>

  <div class="social">
    <a href="https://github.com/Deploylynx-tech" target="_blank">GitHub</a>
    <a href="https://linkedin.com" target="_blank">LinkedIn</a>
    <a href="mailto:deploylynx26@gmail.com">Email</a>
    <a href="https://instagram.com" target="_blank">Instagram</a>
  </div>

</div>

<script>
document.addEventListener("mousemove",e=>{
  document.querySelector(".cursor").style.left=e.clientX+"px";
  document.querySelector(".cursor").style.top=e.clientY+"px";
});

const form = document.getElementById("contactForm");
const button = form.querySelector("button");

form.addEventListener("submit", async function(e){
  e.preventDefault();

  button.disabled = true;
  button.innerText = "Sending...";

  const data = new FormData(form);

  try {
    await Promise.all([
      fetch(form.action, {
        method: "POST",
        body: data,
        headers: { 'Accept': 'application/json' }
      }),
      fetch("https://script.google.com/macros/s/AKfycbztEuM2vU1PhSe5x4qr7N-FSvyFriPQtkuAEP74UxieW6sRRxQXps-Q-tjmhAmbSJ-KFg/exec", {
        method: "POST",
        body: JSON.stringify({
          name: data.get("name"),
          email: data.get("email"),
          message: data.get("message")
        }),
        headers: { "Content-Type": "application/json" },
        mode: "no-cors"
      })
    ]);

    document.getElementById("successMsg").style.display = "block";
    form.reset();

  } catch (err) {
    alert("❌ Failed to send. Try again.");
  }

  button.disabled = false;
  button.innerText = "Send Message";
});

const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let nodes = [];

for(let i=0;i<60;i++){
  nodes.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    dx:(Math.random()-0.5),
    dy:(Math.random()-0.5)
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  nodes.forEach(n=>{
    n.x+=n.dx;
    n.y+=n.dy;

    if(n.x<0||n.x>canvas.width) n.dx*=-1;
    if(n.y<0||n.y>canvas.height) n.dy*=-1;

    ctx.beginPath();
    ctx.arc(n.x,n.y,2,0,Math.PI*2);
    ctx.fillStyle="#00c6ff";
    ctx.fill();
  });

  for(let i=0;i<nodes.length;i++){
    for(let j=i+1;j<nodes.length;j++){
      let dx=nodes[i].x-nodes[j].x;
      let dy=nodes[i].y-nodes[j].y;
      let dist=Math.sqrt(dx*dx+dy*dy);

      if(dist<120){
        ctx.beginPath();
        ctx.moveTo(nodes[i].x,nodes[i].y);
        ctx.lineTo(nodes[j].x,nodes[j].y);
        ctx.strokeStyle="rgba(0,198,255,0.2)";
        ctx.stroke();
      }
    }
  }

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
