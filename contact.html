<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeployLynx</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #020c1b;
      color: white;
    }

    /* BACKGROUND FIX */
    canvas, .background, .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none; /* 🔥 FIX CLICK ISSUE */
    }

    /* NAVBAR */
    nav {
      display: flex;
      justify-content: space-between;
      padding: 15px 40px;
      position: relative;
      z-index: 1000; /* 🔥 FIX */
    }

    nav h1 {
      color: #00d4ff;
      margin: 0;
    }

    nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
      font-size: 16px;
    }

    nav a:hover {
      color: #00d4ff;
    }

    /* MAIN SECTION */
    .container {
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 50px;
      position: relative;
      z-index: 2;
    }

    /* CONTACT BOX */
    .contact-box {
      background: #000;
      padding: 30px;
      border-radius: 15px;
      width: 350px;
    }

    .contact-box h2 {
      text-align: center;
      color: #00d4ff;
    }

    input, textarea {
      width: 100%;
      margin: 10px 0;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #111;
      color: white;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      margin-top: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    .send-btn {
      background: #00d4ff;
    }

    .whatsapp-btn {
      background: #25D366;
      color: white;
    }

    /* CHATBOT */
    .chat-container {
      position: fixed;
      right: 20px;
      bottom: 20px;
      width: 300px;
      background: #000;
      border-radius: 15px;
      overflow: hidden;
      z-index: 999;
    }

    .chat-header {
      background: #00d4ff;
      padding: 10px;
      font-weight: bold;
    }

    .chat-body {
      height: 250px;
      overflow-y: auto;
      padding: 10px;
      font-size: 14px;
    }

    .chat-input {
      display: flex;
    }

    .chat-input input {
      flex: 1;
      border: none;
      padding: 10px;
    }

    .chat-input button {
      width: 50px;
      background: #00d4ff;
      border: none;
    }

    /* MOBILE FIX */
    @media (max-width: 768px) {

      body {
        font-size: 14px;
      }

      nav {
        padding: 10px 15px;
        flex-direction: column;
        align-items: center;
      }

      nav a {
        font-size: 14px;
        margin: 5px;
      }

      .container {
        flex-direction: column;
        padding: 20px;
      }

      .contact-box {
        width: 90%;
      }

      input, textarea {
        font-size: 14px;
      }

      button {
        font-size: 14px;
      }

      .chat-container {
        width: 90%;
        right: 5%;
        bottom: 10px;
      }
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav>
    <h1>DeployLynx</h1>
    <div>
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Services</a>
      <a href="#">Case Studies</a>
      <a href="#">Contact</a>
    </div>
  </nav>

  <!-- MAIN -->
  <div class="container">

    <!-- LEFT IMAGE -->
    <div>
      <img src="https://cdn-icons-png.flaticon.com/512/1055/1055687.png" width="300">
    </div>

    <!-- CONTACT -->
    <div class="contact-box">
      <h2>Contact Us</h2>
      <input type="text" placeholder="Your Name">
      <input type="email" placeholder="Your Email">
      <textarea rows="4" placeholder="Message"></textarea>

      <button class="send-btn">Send Message</button>
      <button class="whatsapp-btn">WhatsApp</button>
    </div>

  </div>

  <!-- CHATBOT -->
  <div class="chat-container">
    <div class="chat-header">DeployLynx AI</div>
    <div class="chat-body">
      Hi 👋 What’s your project?
    </div>
    <div class="chat-input">
      <input type="text" placeholder="Type...">
      <button>➤</button>
    </div>
  </div>

</body>
</html>
