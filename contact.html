<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DeployLynx | Contact</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{background:#0a0f1c;color:#fff;overflow:hidden;}

nav{display:flex;justify-content:space-between;padding:20px 50px;z-index:3;position:relative;}

.logo{font-size:22px;color:#00c6ff;font-weight:bold;}

.menu a{margin-left:25px;color:#ccc;text-decoration:none;}
.menu a:hover{color:#00c6ff;}

canvas{position:fixed;top:0;left:0;z-index:0;}

.container{display:flex;flex-direction:column;align-items:center;justify-content:center;height:90vh;z-index:2;position:relative;gap:20px;}

.visual{position:absolute;left:80px;}

.form-card{background:rgba(0,0,0,0.75);padding:30px;border-radius:15px;width:340px;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);}

.form-card h2{margin-bottom:20px;color:#00c6ff;}

.form-card input,.form-card textarea{width:100%;margin-bottom:15px;padding:10px;border:none;border-radius:8px;background:#111;color:#fff;}

.form-card button{width:100%;padding:10px;border:none;border-radius:8px;background:#00c6ff;color:#000;cursor:pointer;}

.whatsapp-btn{margin-top:10px;display:flex;justify-content:center;background:#25D366;padding:10px;border-radius:8px;color:#fff;text-decoration:none;}

.success{display:none;margin-top:10px;background:#00c6ff;color:#000;padding:10px;border-radius:8px;text-align:center;}

.cursor{width:10px;height:10px;background:gold;border-radius:50%;position:fixed;pointer-events:none;z-index:999;}

/* 🤖 CHATBOT */
.chat-icon{
  position:fixed;
  right:20px;
  bottom:20px;
  width:60px;
  height:60px;
  background:#00c6ff;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  cursor:pointer;
  box-shadow:0 0 20px #00c6ff;
  z-index:9999;
}

.chatbox{
  position:fixed;
  right:20px;
  bottom:90px;
  width:320px;
  background:#0a0f1c;
  border-radius:15px;
  display:none;
  flex-direction:column;
  overflow:hidden;
  box-shadow:0 0 25px rgba(0,198,255,0.4);
}

.chat-header{
  background:#00c6ff;
  color:#000;
  padding:10px;
  font-weight:bold;
}

.chat-body{
  height:260px;
  overflow-y:auto;
  padding:10px;
  font-size:14px;
}

.chat-input{
  display:flex;
}

.chat-input input{
  flex:1;
  padding:10px;
  border:none;
  background:#111;
  color:#fff;
}

.chat-input button{
  padding:10px;
  border:none;
  background:#00c6ff;
}

.bot{color:#00c6ff;margin:5px 0;}
.user{text-align:right;margin:5px 0;}
</style>
</head>

<body>

<canvas id="bg"></canvas>
<div class="cursor"></div>

<nav>
<div class="logo">DeployLynx</div>
<div class="menu">
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Services</a>
<a href="#">Contact</a>
</div>
</nav>

<div class="container">

<div class="visual">
<lottie-player src="https://assets2.lottiefiles.com/packages/lf20_kyu7xb1v.json" background="transparent" speed="1" style="width:300px;height:300px;" loop autoplay></lottie-player>
</div>

<div class="form-card">
<h2>Contact Us</h2>

<form id="contactForm" action="https://formspree.io/f/xpqykbvr" method="POST">
<input type="text" name="name" placeholder="Your Name" required>
<input type="email" name="email" placeholder="Your Email" required>
<textarea name="message" rows="4" placeholder="Message" required></textarea>
<button type="submit">Send Message</button>
</form>

<a href="https://wa.me/message/VXHPTQC4ZU46A1" target="_blank" class="whatsapp-btn">💬 WhatsApp</a>

<div class="success" id="successMsg">Message sent!</div>
</div>

</div>

<!-- 🤖 CHATBOT -->
<div class="chat-icon" onclick="toggleChat()">🤖</div>

<div class="chatbox" id="chatbox">
<div class="chat-header">DeployLynx AI</div>
<div class="chat-body" id="chatBody">
<div class="bot">Hi 👋 What’s your project?</div>
</div>
<div class="chat-input">
<input id="input" placeholder="Type..." />
<button onclick="send()">➤</button>
</div>
</div>

<script>
let step=0;
let data={};

function toggleChat(){
  const box=document.getElementById("chatbox");
  box.style.display=box.style.display==="flex"?"none":"flex";
}

function send(){
  const input=document.getElementById("input");
  const msg=input.value.trim();
  if(!msg)return;

  const chat=document.getElementById("chatBody");
  chat.innerHTML+=`<div class="user">${msg}</div>`;

  if(step===0){data.project=msg;reply("What do you need help with? (AWS, CI/CD, scaling...)");}
  else if(step===1){data.service=msg;reply("What’s your budget range?");}
  else if(step===2){data.budget=msg;reply("What’s your timeline?");}
  else if(step===3){
    data.timeline=msg;
    reply("Perfect 🚀 Redirecting you to WhatsApp...");
    
    let text=`New Lead:%0AProject: ${data.project}%0AService: ${data.service}%0ABudget: ${data.budget}%0ATimeline: ${data.timeline}`;
    
    setTimeout(()=>{
      window.open(`https://wa.me/message/VXHPTQC4ZU46A1?text=${text}`,"_blank");
    },1500);
  }

  step++;
  input.value="";
  chat.scrollTop=chat.scrollHeight;
}

function reply(text){
  const chat=document.getElementById("chatBody");
  setTimeout(()=>{
    chat.innerHTML+=`<div class="bot">${text}</div>`;
    chat.scrollTop=chat.scrollHeight;
  },500);
}
</script>

</body>
</html>
